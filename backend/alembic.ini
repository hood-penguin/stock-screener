# Alembic Configuration File

[alembic]
# path to migration scripts
sqlalchemy.url = driver://user:pass@localhost/dbname
script_location = alembic
prepend_sys_path = .

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to datetime.tz module. If left blank,
# the value in $TZ environment variable is used to render the
# datetime. Note that directories configured by sqlalchemy.url
# take precedence over SQLALCHEMY_TIMEZONE
sqlalchemy.timezone =

# max length of characters to apply to the
# "slug" field
# set to 40 to truncate from the end of existing migration files
# when generating new migration files
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# this is useful for ensuring newly added model changes get detected
# even if the revision command had to create the
# revision file manually
revision_file_args =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: stockscreener_db
    environment:
      POSTGRES_DB: stockscreener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_screener

  redis:
    image: redis:7-alpine
    container_name: stockscreener_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_screener

  backend:
    build:
      context: ./backend
      target: development
    container_name: stockscreener_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    networks:
      - stock_screener
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:localpassword@db:5432/stockscreener
      REDIS_URL: redis://redis:6379/0

  worker:
    build:
      context: ./backend
      target: development
    container_name: stockscreener_worker
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info
    networks:
      - stock_screener
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:localpassword@db:5432/stockscreener
      REDIS_URL: redis://redis:6379/0

  beat:
    build:
      context: ./backend
      target: development
    container_name: stockscreener_beat
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - stock_screener
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:localpassword@db:5432/stockscreener
      REDIS_URL: redis://redis:6379/0

  web:
    build:
      context: ./frontend/apps/web
    container_name: stockscreener_web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/v1
    depends_on:
      - backend
    networks:
      - stock_screener
    command: npm run dev

volumes:
  pgdata:

networks:
  stock_screener:
    driver: bridge
